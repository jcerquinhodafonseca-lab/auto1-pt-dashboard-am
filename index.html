<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auto1 PT — Dashboard AM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f4f5f7;color:#1a1a2e}
a{color:#e63946;text-decoration:none}a:hover{text-decoration:underline}
header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:18px;font-weight:700}
header .am{font-size:13px;opacity:.7;margin-left:auto;cursor:pointer}
.container{max-width:1400px;margin:0 auto;padding:24px}
.tabs{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:24px}
.tab{padding:10px 20px;cursor:pointer;font-weight:600;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:#e63946;border-bottom-color:#e63946}
.tab:hover:not(.active){color:#333}
.view{display:none}.view.active{display:block}
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:9px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px;background:#fff;min-width:160px}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:#e63946}
.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s}
.btn-primary{background:#e63946;color:#fff}.btn-primary:hover{background:#c62828}
.btn-secondary{background:#eee;color:#333}.btn-secondary:hover{background:#ddd}
.btn-green{background:#2e7d32;color:#fff}.btn-green:hover{background:#1b5e20}
.btn-wa{background:#25d366;color:#fff}.btn-wa:hover{background:#128c7e}
.btn-sm{padding:5px 12px;font-size:13px}
.stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#fff;border-radius:8px;padding:14px 20px;flex:1;min-width:140px;border:1px solid #e8e8e8}
.stat .num{font-size:26px;font-weight:700;color:#e63946}
.stat .lbl{font-size:12px;color:#888;margin-top:2px}
.table-wrap{background:#fff;border-radius:8px;border:1px solid #e8e8e8;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-weight:600;opacity:.65;font-size:13px;background:#fafafa;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:last-child td{border-bottom:none}tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.badge-ok{background:#e8f5e9;color:#2e7d32}.badge-warn{background:#fff3e0;color:#e65100}
.badge-neutral{background:#e3f2fd;color:#1565c0}.badge-gray{background:#f5f5f5;color:#666}
.pagination{padding:12px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid #f0f0f0}
.pag-btn{padding:4px 12px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:13px}
.pag-btn:disabled{opacity:.35;cursor:default}
.pag-info{font-size:13px;color:#666;flex:1;text-align:center}
.detail-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:900px){.detail-layout{grid-template-columns:1fr}}
.card{background:#fff;border-radius:8px;border:1px solid #e8e8e8;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;font-weight:700;margin-bottom:16px;color:#1a1a2e;border-bottom:1px solid #f0f0f0;padding-bottom:10px}
.info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f9f9f9}
.info-row:last-child{border-bottom:none}
.info-label{color:#888;font-size:13px}.info-value{font-weight:600;font-size:13px;text-align:right}
.calc-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.calc-row label{font-size:13px;color:#555;align-self:center}
.calc-row input{padding:7px 10px;border:1px solid #ddd;border-radius:5px;font-size:14px;width:100%}
.calc-row input:focus{outline:none;border-color:#e63946}
.calc-result{background:#1a1a2e;color:#fff;border-radius:6px;padding:14px;margin-top:12px}
.calc-result .total{font-size:20px;font-weight:700}
.diff-green{color:#66bb6a}.diff-red{color:#ef5350}
.msg-box{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:8px;padding:16px;font-size:13px;white-space:pre-wrap;line-height:1.7;min-height:120px;color:#222}
.msg-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.history-item{background:#fff;border-radius:8px;border:1px solid #e8e8e8;padding:16px;margin-bottom:12px}
.history-car{font-weight:700;font-size:15px}.history-meta{font-size:12px;color:#888}
.history-client{font-size:13px;color:#555;margin:4px 0}
.history-msg{font-size:12px;color:#777;background:#f5f5f5;padding:8px;border-radius:4px;white-space:pre-wrap;max-height:80px;overflow:hidden}

.history-item{position:relative}
.status-dot{position:absolute;top:14px;right:16px;width:14px;height:14px;border-radius:50%}
.dot-green{background:#2e7d32}.dot-red{background:#c62828}.dot-orange{background:#e65100}.dot-none{background:#ccc}
.status-bar{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.status-btn{padding:4px 14px;border-radius:12px;border:1px solid #ddd;cursor:pointer;font-size:12px;font-weight:600;background:#fff;transition:all .15s}
.status-btn.active-verde{background:#e8f5e9;color:#2e7d32;border-color:#2e7d32}
.status-btn.active-vermelho{background:#ffebee;color:#c62828;border-color:#c62828}
.status-btn.active-laranja{background:#fff3e0;color:#e65100;border-color:#e65100}
.status-btn:hover{opacity:.8}
.sale-fields{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.sale-fields input{padding:6px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;flex:1;min-width:140px}
.sale-fields input:focus{outline:none;border-color:#e63946}
.ci-check{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;color:#555;cursor:pointer}
.ci-check input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#e63946}
.sub-tabs{display:flex;gap:0;border-bottom:1px solid #e0e0e0;margin-bottom:16px}
.sub-tab{padding:7px 18px;cursor:pointer;font-size:13px;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.sub-tab.active{color:#e63946;border-bottom-color:#e63946}
.vendas-stat{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.vendas-stat .vstat{background:#fff;border-radius:8px;padding:12px 18px;border:1px solid #e8e8e8;font-size:13px}
.vendas-stat .vstat strong{font-size:20px;color:#2e7d32;display:block}
.vendas-stat .vstat.orange strong{color:#e65100}
</style>
</head>
<body>
<header>
  <div style="background:#e63946;border-radius:6px;padding:4px 10px;font-weight:700;font-size:13px">A1</div>
  <h1>Auto1 Portugal — Dashboard AM</h1>
  <span class="am" id="am-display" onclick="changeAm()" title="Clica para mudar o nome"></span>
</header>
<div class="container">
  <div id="am-setup" style="background:#fff;border-radius:8px;border:1px solid #e8e8e8;padding:24px;max-width:400px;margin:0 auto 24px">
    <h3 style="margin-bottom:12px;font-size:16px">Bem-vindo! Qual é o seu nome?</h3>
    <div style="display:flex;gap:10px">
      <input id="am-name-input" type="text" placeholder="O seu nome (ex: João Silva)"
             style="flex:1;padding:9px 14px;border:1px solid #ddd;border-radius:6px;font-size:14px"
             onkeydown="if(event.key==='Enter')setAmName()"/>
      <button class="btn btn-primary" onclick="setAmName()">Entrar</button>
    </div>
  </div>
  <div id="main-app" style="display:none">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('browse')">Catálogo PT</div>
      <div class="tab" onclick="switchTab('search')">Pesquisar Carro</div>
      <div class="tab" onclick="switchTab('history')">Histórico</div>
    </div>

    <div id="tab-browse" class="view active">
      <div class="stats">
        <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">Carros disponíveis</div></div>
        <div class="stat"><div class="num" id="stat-brands">0</div><div class="lbl">Marcas</div></div>
        <div class="stat"><div class="num" id="stat-recs">0</div><div class="lbl">Recomendações enviadas</div></div>
      </div>
      <div class="search-bar">
        <input id="browse-q" type="text" placeholder="Pesquisar marca, modelo, stock…" oninput="filterCars()" style="flex:2;min-width:180px"/>
        <select id="filter-make" onchange="filterCars()"><option value="">Todas as marcas</option></select>
        <select id="filter-fuel" onchange="filterCars()"><option value="">Todos os combustíveis</option></select>
        <select id="filter-km" onchange="filterCars()">
          <option value="">Todos os km</option>
          <option value="0-50000">0 — 50.000 km</option>
          <option value="50000-100000">50.000 — 100.000 km</option>
          <option value="100000-150000">100.000 — 150.000 km</option>
          <option value="150000-200000">150.000 — 200.000 km</option>
          <option value="200000-250000">200.000 — 250.000 km</option>
          <option value="250000+">+ 250.000 km</option>
        </select>
        <select id="filter-condition" onchange="filterCars()">
          <option value="">Qualquer condição</option>
          <option value="não acidentado">Não acidentado</option>
          <option value="acidentado">Acidentado</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="resetFilters()">Limpar</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Stock</th><th>Marca</th><th>Modelo</th><th>Ano</th>
            <th>Km</th><th>Combustível</th><th>Condição</th>
            <th>Origem</th><th>Preço Auto1</th><th>Localização</th><th></th>
          </tr></thead>
          <tbody id="cars-tbody"></tbody>
        </table>
        <div class="pagination">
          <button class="pag-btn" id="pag-prev" onclick="changePage(-1)" disabled>← Anterior</button>
          <span class="pag-info" id="pag-info"></span>
          <button class="pag-btn" id="pag-next" onclick="changePage(1)">Próximo →</button>
        </div>
      </div>
    </div>

    <div id="tab-search" class="view">
      <div class="search-bar" style="max-width:500px">
        <input id="stock-input" type="text" placeholder="Nº do carro (ex: HA23712)"
               style="flex:1;text-transform:uppercase" maxlength="12"
               onkeydown="if(event.key==='Enter')searchCar()"/>
        <button class="btn btn-primary" onclick="searchCar()">Pesquisar</button>
      </div>
      <div id="search-error" style="background:#ffebee;color:#c62828;padding:12px 16px;border-radius:6px;margin-bottom:16px;display:none"></div>
      <div id="car-detail" style="display:none"></div>
    </div>

    <div id="tab-history" class="view">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="font-size:16px;font-weight:700">Histórico</h3>
        <button class="btn btn-secondary btn-sm" onclick="refreshHistory()">↻ Atualizar</button>
      </div>
      <div class="sub-tabs">
        <div class="sub-tab active" onclick="switchHistoryTab('todas')">Todas as Propostas</div>
        <div class="sub-tab" onclick="switchHistoryTab('vendas')">Vendas</div>
      </div>
      <div id="history-todas"><div id="history-list"></div></div>
      <div id="history-vendas" style="display:none"><div id="vendas-list"></div></div>
    </div>
  </div>
</div>

let allCars=[...ALL_CARS], filteredCars=[...ALL_CARS], page=0;
const PAGE_SIZE=25;
let amName=localStorage.getItem("am_name")||"";
let currentCar=null;

window.onload=function(){
  if(amName) showApp();
  else document.getElementById("am-name-input").focus();
};

function setAmName(){
  const v=document.getElementById("am-name-input").value.trim();
  if(!v)return;
  amName=v; localStorage.setItem("am_name",v); showApp();
}
function changeAm(){
  if(confirm("Mudar o nome do AM?")){ localStorage.removeItem("am_name"); location.reload(); }
}
function showApp(){
  document.getElementById("am-setup").style.display="none";
  document.getElementById("main-app").style.display="block";
  document.getElementById("am-display").textContent="👤 "+amName;
  initBrowse();
}
function switchTab(name){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["browse","search","history"][i]===name));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  if(name==="history"){ renderHistory(); }
}

function initBrowse(){
  filteredCars=[...allCars];
  document.getElementById("stat-total").textContent=allCars.length;
  const brands=[...new Set(allCars.map(c=>c.mk).filter(Boolean))].sort();
  document.getElementById("stat-brands").textContent=brands.length;
  const mk=document.getElementById("filter-make");
  brands.forEach(b=>{ const o=document.createElement("option");o.value=b;o.textContent=b;mk.appendChild(o); });
  const fuels=[...new Set(allCars.map(c=>c.f).filter(Boolean))].sort();
  const fl=document.getElementById("filter-fuel");
  fuels.forEach(f=>{ const o=document.createElement("option");o.value=f.toLowerCase();o.textContent=f;fl.appendChild(o); });
  updateRecCount(); renderTable();
}

function updateRecCount(){
  document.getElementById("stat-recs").textContent=JSON.parse(localStorage.getItem("recommendations")||"[]").length;
}

function kmInRange(km, range){
  if(!range) return true;
  if(!km && km!==0) return false;
  if(range==="250000+") return km>250000;
  const [min,max]=range.split("-").map(Number);
  return km>=min && km<max;
}

function filterCars(){
  const q=document.getElementById("browse-q").value.trim().toLowerCase();
  const make=document.getElementById("filter-make").value.toLowerCase();
  const fuel=document.getElementById("filter-fuel").value.toLowerCase();
  const km=document.getElementById("filter-km").value;
  const cond=document.getElementById("filter-condition").value.toLowerCase();
  filteredCars=allCars.filter(c=>{
    if(make&&c.mk.toLowerCase()!==make) return false;
    if(fuel&&c.f.toLowerCase()!==fuel) return false;
    if(cond&&c.c.toLowerCase()!==cond) return false;
    if(!kmInRange(c.km, km)) return false;
    if(q){ const s=(c.mk+" "+c.mo+" "+c.s+" "+c.b).toLowerCase(); if(!s.includes(q)) return false; }
    return true;
  });
  page=0; renderTable();
}

function resetFilters(){
  document.getElementById("browse-q").value="";
  document.getElementById("filter-make").value="";
  document.getElementById("filter-fuel").value="";
  document.getElementById("filter-km").value="";
  document.getElementById("filter-condition").value="";
  filterCars();
}

function renderTable(){
  const start=page*PAGE_SIZE, slice=filteredCars.slice(start,start+PAGE_SIZE);
  document.getElementById("cars-tbody").innerHTML=slice.map(c=>`
    <tr>
      <td><strong>${c.s}</strong></td><td>${c.mk}</td><td>${c.mo}</td>
      <td>${c.y||"—"}</td>
      <td>${c.km?c.km.toLocaleString("pt")+" km":"—"}</td>
      <td>${c.f||"—"}</td>
      <td><span class="badge ${c.c==="Não acidentado"?"badge-ok":"badge-warn"}">${c.c}</span></td>
      <td><span class="badge ${c.o==="Nacional"?"badge-neutral":"badge-gray"}">${c.o}</span></td>
      <td>${c.p?"€ "+c.p.toLocaleString("pt"):"—"}</td>
      <td>${c.b||"—"}</td>
      <td><button class="btn btn-primary btn-sm" onclick="openCar('${c.s}')">Selecionar</button></td>
    </tr>`).join("");
  const total=filteredCars.length, end=Math.min(start+PAGE_SIZE,total);
  document.getElementById("pag-info").textContent=total===0?"Sem resultados":`${start+1}–${end} de ${total}`;
  document.getElementById("pag-prev").disabled=page===0;
  document.getElementById("pag-next").disabled=end>=total;
}

function changePage(dir){ page+=dir; renderTable(); window.scrollTo(0,0); }
function openCar(sn){ document.getElementById("stock-input").value=sn; switchTab("search"); searchCar(); }

function searchCar(){
  const sn=document.getElementById("stock-input").value.trim().toUpperCase();
  if(!sn)return;
  const car=allCars.find(c=>c.s===sn);
  const errEl=document.getElementById("search-error");
  const detEl=document.getElementById("car-detail");
  if(!car){ errEl.style.display="block"; errEl.textContent=`Carro ${sn} não encontrado no catálogo atual.`; detEl.style.display="none"; return; }
  errEl.style.display="none"; currentCar=car; detEl.style.display="block"; renderDetail(car);
}

          <div class="calc-row"><label>Transporte (€)</label><input id="trp" type="number" placeholder="ex: 99" oninput="calc()"/></div>

        <div class="card">
          <h3>Mensagem para WhatsApp</h3>
          <div class="msg-box" id="msg-preview">Preencha a calculadora para gerar a mensagem…</div>
          <div class="msg-actions">
            <button class="btn btn-secondary btn-sm" onclick="copyMsg()">📋 Copiar</button>
            <button class="btn btn-wa btn-sm" onclick="sendWA()">📱 Enviar WhatsApp</button>
            
          </div>
          <div id="save-ok" style="font-size:13px;color:#2e7d32;margin-top:8px;display:none">✓ Guardado!</div>
        </div>
      </div>
    </div>`;
}

function ir(l,v){ return `<div class="info-row"><span class="info-label">${l}</span><span class="info-value">${v??'—'}</span></div>`; }

function calc(){
  const pvp=+document.getElementById("pvp")?.value||0;
  const svc=+document.getElementById("svc")?.value||0;
  const trp=+document.getElementById("trp")?.value||0;
  const obra=+document.getElementById("obra")?.value||0;
  const mg=+document.getElementById("margin")?.value||0;
  if(!pvp){ document.getElementById("calc-result").style.display="none"; updateMsg(); return; }
  const ideal=pvp-svc-trp-obra-mg;
  const a1=currentCar?.p||0;
  const diff=a1-ideal;
  document.getElementById("calc-result").style.display="block";
  document.getElementById("calc-ideal").textContent="€ "+ideal.toLocaleString("pt",{minimumFractionDigits:0,maximumFractionDigits:0});
  if(a1&&Math.abs(diff)>1){
    const abs=Math.abs(diff).toLocaleString("pt",{minimumFractionDigits:0,maximumFractionDigits:0});
    document.getElementById("calc-diff").innerHTML=diff<0
      ?`<span class="diff-green">✓ O nosso está €${abs} mais barato → incrementa margem bruta</span>`
      :`<span class="diff-red">⚠ O nosso está €${abs} acima do preço ideal</span>`;
  } else document.getElementById("calc-diff").textContent="Preço alinhado com o ideal";
  updateMsg();
}

function updateMsg(){
  if(!currentCar) return;
  const c=currentCar;
  const pvp=+document.getElementById("pvp")?.value||0;
  const svc=+document.getElementById("svc")?.value||0;
  const trp=+document.getElementById("trp")?.value||0;
  const obra=+document.getElementById("obra")?.value||0;
  const mg=+document.getElementById("margin")?.value||0;
  const km=c.km?c.km.toLocaleString("pt")+" km":"—";
  const a1=c.p||0;
  const url=`https://www.auto1.com/pt/app/merchant/car/${c.s}`;
  if(!pvp){ document.getElementById("msg-preview").textContent=`${c.mk} ${c.mo} - ${c.y||"—"} - ${km} - ${c.c} - ${c.o}

Preencha a calculadora…`; return; }
  const ideal=pvp-svc-trp-obra-mg;
  const diff=a1-ideal;
  const fmt=n=>"€ "+Math.round(n).toLocaleString("pt");
  let msg=`${c.mk} ${c.mo} - ${c.y||"—"} - ${km} - ${c.c} - ${c.o}

`;
  msg+=`${fmt(pvp)} (PVP ideal)`;
  if(svc) msg+=` - ${fmt(svc)} (Custos de serviço)`;
  if(trp) msg+=` - ${fmt(trp)} (Transporte)`;
  if(obra) msg+=` - ${fmt(obra)} (Obra)`;
  if(mg) msg+=` - ${fmt(mg)} (Margem bruta)`;
  msg+=` = ${fmt(ideal)} (Preço ideal de compra)`;
  if(a1&&Math.abs(diff)>1){
    const abs=Math.abs(diff).toLocaleString("pt",{minimumFractionDigits:0,maximumFractionDigits:0});
    if(diff<0){
      msg+=`
O nosso está no site a ${fmt(a1)}, estando €${abs} mais barato, o que incrementa à margem bruta`;
    } else {
      msg+=`
O nosso está no site a ${fmt(a1)}, estando €${abs} acima do preço ideal de compra`;
    }
  }
  msg+=`

🔗 ${url}`;
  document.getElementById("msg-preview").textContent=msg;
}

function copyMsg(){
  const msg=document.getElementById("msg-preview")?.textContent||"";
  navigator.clipboard.writeText(msg).then(()=>{ const b=event.target; b.textContent="✓ Copiado!"; setTimeout(()=>b.textContent="📋 Copiar",2000); });
  saveRec(true);
}
function sendWA(){
  const msg=document.getElementById("msg-preview")?.textContent||"";
  window.open("https://web.whatsapp.com/send?text="+encodeURIComponent(msg),"_blank");
  saveRec(true);
}

function saveRec(silent=false){
  if(!currentCar) return;
  const pvp=+document.getElementById("pvp")?.value||0;
  const svc=+document.getElementById("svc")?.value||0;
  const trp=+document.getElementById("trp")?.value||0;
  const obra=+document.getElementById("obra")?.value||0;
  const mg=+document.getElementById("margin")?.value||0;
  const msg=document.getElementById("msg-preview")?.textContent||"";
  const cid=document.getElementById("client-id")?.value||"";
  const cname=document.getElementById("client-name")?.value||"";
  const ideal=pvp-svc-trp-obra-mg;
  const diff=(currentCar.p||0)-ideal;
  const recs=JSON.parse(localStorage.getItem("recommendations")||"[]");
  recs.unshift({stock_number:currentCar.s,make:currentCar.mk,model:currentCar.mo,built_year:currentCar.y,mileage:currentCar.km,auto1_price:currentCar.p,pvp_ideal:pvp,service_costs:svc,transport:trp,obra,margin:mg,ideal_buy_price:ideal,difference:diff,client_id:cid,client_name:cname,am_name:amName,message:msg,created_at:new Date().toISOString()});
  localStorage.setItem("recommendations",JSON.stringify(recs.slice(0,200)));
  if(!silent){ document.getElementById("save-ok").style.display="block"; setTimeout(()=>document.getElementById("save-ok").style.display="none",3000); }
  updateRecCount();
}

function renderHistory(){
  const recs=JSON.parse(localStorage.getItem("recommendations")||"[]");
  const el=document.getElementById("history-list");
  if(!recs.length){ el.innerHTML='<p style="color:#888;padding:20px">Sem recomendações ainda.</p>'; return; }
  el.innerHTML=recs.map((r,i)=>{
    const ideal=r.ideal_buy_price?"€ "+Math.round(r.ideal_buy_price).toLocaleString("pt"):"—";
    const diff=r.difference;
    const ds=diff!=null?(diff<0?`✓ €${Math.abs(Math.round(diff)).toLocaleString("pt")} mais barato`:`⚠ €${Math.round(diff).toLocaleString("pt")} acima`):"";
    const st=r.sale_status||"";
    const dotClass=st==="vendido"?"dot-green":st==="nao_vendido"?"dot-red":st==="licitado"?"dot-orange":"dot-none";
    const btnVerde=st==="vendido"?"active-verde":"";
    const btnVermelho=st==="nao_vendido"?"active-vermelho":"";
    const btnLaranja=st==="licitado"?"active-laranja":"";
    const ciChecked=r.compra_imediata?"checked":"";
    const saleFields=st==="vendido"?`
      <label class="ci-check">
        <input type="checkbox" ${ciChecked} onchange="updateSaleField(${i},'compra_imediata',this.checked)" />
        Compra Imediata
      </label>
      <div class="sale-fields">
        <input placeholder="ID da venda" value="${r.sale_id||""}" oninput="updateSaleField(${i},'sale_id',this.value)" />
        <input type="number" placeholder="Preço de venda (€)" value="${r.sale_price||""}" oninput="updateSaleField(${i},'sale_price',this.value)" />
      </div>`:"";
    return `<div class="history-item">
      <div class="status-dot ${dotClass}"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-right:24px">
        <div><div class="history-car">${r.make} ${r.model} — ${r.stock_number}</div>
        <div class="history-meta">${r.built_year||"—"} · ${r.mileage?r.mileage.toLocaleString("pt")+"km":"—"} · Ideal: ${ideal} ${ds}</div></div>
        <div class="history-meta" style="text-align:right">${r.am_name||"—"}<br/>${r.created_at?r.created_at.substring(0,16).replace("T"," "):""}</div>
      </div>
      <div class="history-client">👤 ${r.client_name||"—"} ${r.client_id?"(#"+r.client_id+")":""}</div>
      <div class="history-msg">${(r.message||"").replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
      <div class="status-bar">
        <span style="font-size:12px;color:#888">Estado:</span>
        <button class="status-btn ${btnVermelho}" onclick="setStatus(${i},'nao_vendido')">✗ Não Vendido</button>
        <button class="status-btn ${btnVerde}" onclick="setStatus(${i},'vendido')">✓ Vendido</button>
        <button class="status-btn ${btnLaranja}" onclick="setStatus(${i},'licitado')">⚡ Licitado</button>
      </div>
      ${saleFields}
    </div>`;
  }).join("");
}

function renderVendas(){
  const recs=JSON.parse(localStorage.getItem("recommendations")||"[]");
  const vendidos=recs.filter(r=>r.sale_status==="vendido");
  const licitados=recs.filter(r=>r.sale_status==="licitado");
  const ci=vendidos.filter(r=>r.compra_imediata);
  const el=document.getElementById("vendas-list");
  if(!vendidos.length&&!licitados.length){ el.innerHTML='<p style="color:#888;padding:20px">Ainda sem vendas ou licitações registadas.</p>'; return; }
  const totalVendas=vendidos.reduce((s,r)=>s+(+r.sale_price||0),0);
  el.innerHTML=`
    <div class="vendas-stat">
      <div class="vstat"><strong>${vendidos.length}</strong> Carros vendidos</div>
      <div class="vstat"><strong>${ci.length}</strong> Compra imediata</div>
      ${totalVendas?`<div class="vstat"><strong>€ ${Math.round(totalVendas).toLocaleString("pt")}</strong> Volume de vendas</div>`:""}
      <div class="vstat orange"><strong>${licitados.length}</strong> Licitados (não ganhos)</div>
    </div>
  `
  + vendidos.map(r=>{
    const diff=r.difference;
    const ds=diff!=null?(diff<0?`✓ €${Math.abs(Math.round(diff)).toLocaleString("pt")} mais barato`:`⚠ €${Math.round(diff).toLocaleString("pt")} acima`):"";
    return `<div class="history-item" style="border-left:3px solid #2e7d32">
      <div class="status-dot dot-green"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-right:24px">
        <div>
          <div class="history-car">${r.make} ${r.model} — ${r.stock_number} ${r.compra_imediata?'<span style="font-size:11px;background:#e8f5e9;color:#2e7d32;border-radius:8px;padding:2px 8px;margin-left:6px">Compra Imediata</span>':''}</div>
          <div class="history-meta">${r.built_year||"—"} · ${r.mileage?r.mileage.toLocaleString("pt")+"km":"—"} ${ds}</div>
        </div>
        <div class="history-meta" style="text-align:right">${r.am_name||"—"}<br/>${r.created_at?r.created_at.substring(0,16).replace("T"," "):""}</div>
      </div>
      <div class="history-client">👤 ${r.client_name||"—"} ${r.client_id?"(#"+r.client_id+")":""}</div>
      ${r.sale_price?`<div style="font-size:13px;font-weight:700;color:#2e7d32;margin-top:6px">💶 Vendido por € ${Math.round(r.sale_price).toLocaleString("pt")} ${r.sale_id?"· ID: "+r.sale_id:""}</div>`:""}
    </div>`;
  }).join("")
  + (licitados.length?`<h4 style="font-size:13px;font-weight:700;color:#e65100;margin:16px 0 8px">⚡ Licitados (não ganhos)</h4>`:"")
  + licitados.map(r=>{
    const diff=r.difference;
    const ds=diff!=null?(diff<0?`✓ €${Math.abs(Math.round(diff)).toLocaleString("pt")} mais barato`:`⚠ €${Math.round(diff).toLocaleString("pt")} acima`):"";
    return `<div class="history-item" style="border-left:3px solid #e65100">
      <div class="status-dot dot-orange"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-right:24px">
        <div><div class="history-car">${r.make} ${r.model} — ${r.stock_number}</div>
        <div class="history-meta">${r.built_year||"—"} · ${r.mileage?r.mileage.toLocaleString("pt")+"km":"—"} ${ds}</div></div>
        <div class="history-meta" style="text-align:right">${r.am_name||"—"}<br/>${r.created_at?r.created_at.substring(0,16).replace("T"," "):""}</div>
      </div>
      <div class="history-client">👤 ${r.client_name||"—"} ${r.client_id?"(#"+r.client_id+")":""}</div>
    </div>`;
  }).join("");
}

function setStatus(index, status){
  const recs=JSON.parse(localStorage.getItem("recommendations")||"[]");
  if(!recs[index]) return;
  recs[index].sale_status = recs[index].sale_status===status ? "" : status;
  localStorage.setItem("recommendations", JSON.stringify(recs));
  renderHistory();
}

function updateSaleField(index, field, value){
  const recs=JSON.parse(localStorage.getItem("recommendations")||"[]");
  if(!recs[index]) return;
  recs[index][field]=value;
  localStorage.setItem("recommendations", JSON.stringify(recs));
}

function switchHistoryTab(tab){
  document.querySelectorAll(".sub-tab").forEach((t,i)=>t.classList.toggle("active",["todas","vendas"][i]===tab));
  document.getElementById("history-todas").style.display=tab==="todas"?"block":"none";
  document.getElementById("history-vendas").style.display=tab==="vendas"?"block":"none";
  if(tab==="vendas") renderVendas();
}

function refreshHistory(){
  renderHistory();
  const vendaTab=document.querySelector(".sub-tab.active")?.textContent?.includes("Vendas");
  if(vendaTab) renderVendas();
}
</script>
</body>
</html>
